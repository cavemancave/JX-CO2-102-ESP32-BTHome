substitutions:
  device_name: jx-co2-102
  friendly_name: JX-CO2-102 Sensor

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "JX-CO2-102 Fallback Hotspot"
    password: !secret wifi_password

captive_portal:

# ── UART (JX-CO2-102, active mode, 1 s ASCII output) ──────────────────────────
uart:
  id: co2_uart
  rx_pin: GPIO4
  tx_pin: GPIO5
  baud_rate: 9600

# ── Globals ───────────────────────────────────────────────────────────────────
globals:
  - id: g_auto_calib
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: g_comm_mode
    type: int
    restore_value: yes
    initial_value: '1'          # 1=active, 2=query
  - id: g_report_interval
    type: int
    restore_value: yes
    initial_value: '60'         # seconds

# ── CO2 sensor (parse ASCII line "  1234 ppm\r\n") ────────────────────────────
sensor:
  - platform: uart
    id: co2_ppm
    name: "CO2"
    uart_id: co2_uart
    unit_of_measurement: ppm
    device_class: carbon_dioxide
    state_class: measurement
    accuracy_decimals: 0
    update_interval: never      # driven by UART data
    lambda: |-
      if (x.size() == 0) return {};
      // sensor outputs "  1234 ppm\r\n", parse first integer
      std::string s(x.begin(), x.end());
      int ppm = 0;
      if (sscanf(s.c_str(), "%d", &ppm) == 1) {
        if (ppm < 0) ppm = 0;
        if (ppm > 5000) ppm = 5000;
        return (float)ppm;
      }
      return {};

# ── BTHome BLE advertisement ──────────────────────────────────────────────────
esp32_ble_tracker:
  scan_parameters:
    active: false

bluetooth_proxy:
  active: false

# Broadcast CO2 via BTHome v2 so existing BLE Proxy / HA BTHome still works
# ESPHome BTHome component handles UUID 0xFCD2 and object encoding automatically
bthome:
  - id: bthome_adv
    name: ${friendly_name}
    sensors:
      - sensor_id: co2_ppm
        measurement_type: co2

# ── Calibration button ────────────────────────────────────────────────────────
button:
  - platform: template
    name: "CO2 Calibrate"
    icon: mdi:target
    on_press:
      - uart.write:
          id: co2_uart
          data: [0xFF, 0x01, 0x05, 0x07, 0x00, 0x00, 0x00, 0x00, 0xF4]
      - logger.log: "Calibration command sent"

  # Physical BOOT button (GPIO9, active-low)
  - platform: gpio
    pin:
      number: GPIO9
      inverted: true
      mode:
        input: true
        pullup: true
    name: "CO2 Calibrate (Physical)"
    on_press:
      - uart.write:
          id: co2_uart
          data: [0xFF, 0x01, 0x05, 0x07, 0x00, 0x00, 0x00, 0x00, 0xF4]
      - logger.log: "Calibration command sent (physical button)"

# ── Auto-calibration switch ───────────────────────────────────────────────────
switch:
  - platform: template
    name: "CO2 Auto Calibration"
    icon: mdi:calendar-sync
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: |-
      return id(g_auto_calib);
    turn_on_action:
      - globals.set:
          id: g_auto_calib
          value: 'true'
      - uart.write:
          id: co2_uart
          data: [0xFF, 0x01, 0x05, 0x05, 0x00, 0x00, 0x00, 0x00, 0xF6]
      - logger.log: "Auto-calibration enabled"
    turn_off_action:
      - globals.set:
          id: g_auto_calib
          value: 'false'
      - uart.write:
          id: co2_uart
          data: [0xFF, 0x01, 0x05, 0x06, 0x00, 0x00, 0x00, 0x00, 0xF5]
      - logger.log: "Auto-calibration disabled"

# ── Comm mode select ──────────────────────────────────────────────────────────
select:
  - platform: template
    name: "CO2 Comm Mode"
    icon: mdi:swap-horizontal
    options:
      - "Active (push)"
      - "Query (MODBUS)"
    restore_value: true
    initial_option: "Active (push)"
    optimistic: true
    on_value:
      - if:
          condition:
            lambda: 'return x == "Active (push)";'
          then:
            - globals.set:
                id: g_comm_mode
                value: '1'
            - uart.write:
                id: co2_uart
                data: [0xFF, 0x01, 0x03, 0x01, 0x00, 0x00, 0x00, 0x00, 0xFC]
            - logger.log: "Comm mode: Active"
          else:
            - globals.set:
                id: g_comm_mode
                value: '2'
            - uart.write:
                id: co2_uart
                data: [0xFF, 0x01, 0x03, 0x02, 0x00, 0x00, 0x00, 0x00, 0xFB]
            - logger.log: "Comm mode: Query"

# ── Report interval number ────────────────────────────────────────────────────
number:
  - platform: template
    name: "CO2 Report Interval"
    icon: mdi:timer-outline
    unit_of_measurement: s
    min_value: 1
    max_value: 3600
    step: 1
    restore_value: true
    initial_value: 60
    optimistic: true
    on_value:
      - globals.set:
          id: g_report_interval
          value: !lambda 'return (int)x;'
      - logger.log:
          format: "Report interval set to %d s"
          args: ['(int)x']

# ── Interval-based CO2 update (throttle BLE adv + HA state) ──────────────────
interval:
  - interval: 1s
    then:
      - lambda: |-
          static int tick = 0;
          tick++;
          if (tick >= id(g_report_interval)) {
            tick = 0;
            // force HA state update at configured interval
            if (!isnan(id(co2_ppm).state)) {
              id(co2_ppm).publish_state(id(co2_ppm).state);
            }
          }
